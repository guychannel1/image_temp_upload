<!doctype html>
<html lang="th" class="h-full bg-grid text-zinc-100">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- 
			Anti-flash script: รันก่อน render ทุกอย่าง
			อ่าน localStorage แล้วใส่ class ทันที ไม่ให้พริบ
		-->
		<script>
			(function() {
				try {
					if (localStorage.getItem('theme') === 'dark') {
						document.documentElement.classList.add('dark');
					} else {
						document.documentElement.classList.add('light-mode');
					}
				} catch (e) {
					document.documentElement.classList.add('light-mode');
				}
			})();
		</script>

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
		
		%sveltekit.head%
	</head>
	<body class="h-full flex flex-col font-sans overflow-x-hidden relative bg-grid" style="transition: background-color 0.3s ease, color 0.3s ease;" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
